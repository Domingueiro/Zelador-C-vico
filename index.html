<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header style="text-align: center; background: #004a80; color: white; padding: 20px;">
        <h1 style="margin: 0;">ZELADOR CÍVICO</h1>
        <div style="font-weight: bold; color: #FFD700; margin: 10px 0;">Transformando VISÃO em PODER</div>
        <p style="margin: 0; font-size: 0.9rem;">Auditoria Social e Transparência Territorial</p>
    </header>

    <main style="padding: 15px; max-width: 600px; margin: auto;">
        <div class="card" style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <h3>🔍 Consultar CEP</h3>
            <input type="text" id="cep" placeholder="Ex: 08410000" style="width: 70%; padding: 10px;">
            <button onclick="buscarDados()" style="background: #28a745; color: white; border: none; padding: 10px;">Analisar</button>
        </div>

        <div id="map" style="height: 200px; border-radius: 8px; margin-bottom: 15px;"></div>

        <div class="card" style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <h3>📊 Dados Territoriais</h3>
            <div id="arrecadacao">Aguardando consulta...</div>
            <div id="alertas" style="margin-top: 10px;"></div>
            <div id="btn-comparar-container" style="display:none; margin-top: 15px;">
                <button onclick="mostrarComparativo()" style="background: #6f42c1; color: white; border: none; padding: 10px; width: 100%;">⚖️ Comparar Disparidade</button>
            </div>
        </div>

        <div id="modal-comparativo" class="card" style="display:none; border: 2px solid #6f42c1; background: #fdfbff; padding: 15px; border-radius: 8px;">
            <h3>⚖️ Disparidade Territorial</h3>
            <div id="tabela-comparativa"></div>
            <button onclick="document.getElementById('modal-comparativo').style.display='none'" style="margin-top: 10px;">Fechar</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>

        <div class="card">
            <h3>📢 Ação Cívica</h3>
            <button onclick="acionarOrgao('TCM/MP')" style="background: #dc3545; margin-bottom: 10px;">🚨 Denúncia Rápida (TCM/MP)</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
