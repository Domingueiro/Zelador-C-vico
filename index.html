<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelador Cívico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header style="text-align: center; background: #004a80; color: white; padding: 20px;">
        <h1 style="margin: 0; font-size: 1.8rem;">ZELADOR CÍVICO</h1>
        <div style="font-weight: bold; font-size: 1.1rem; color: #FFD700; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px;">
            Transformando VISÃO em PODER
        </div>
        <p style="margin: 0; font-size: 0.9rem; opacity: 0.9;">Auditoria Social e Transparência Territorial</p>
    </header>


    <main>
        <div class="card">
            <h3>🔍 Consultar Território</h3>
            <div id="busca">
                <input type="text" id="cep" placeholder="Digite o CEP (ex: 01001000)">
                <button onclick="buscarDados()">Analisar</button>
            </div>
        </div>

        <div id="map"></div>

        <div class="card">
            <h3>📊 Arrecadação vs. Investimento</h3>
            <div id="arrecadacao">Aguardando consulta...</div>
        </div>

        <div class="card">
            <h3>🚨 Radar de Licitações</h3>
            <div id="alertas">Consulte um CEP para ver os alertas da região.</div>
        </div>

        <div class="card">
            <h3>📢 Ação Cívica</h3>
            <button onclick="acionarOrgao('TCM/MP')" style="background: #dc3545; margin-bottom: 10px;">🚨 Denúncia Rápida (TCM/MP)</button>
            <button onclick="gerarRelatorio()" style="background: #004a80;">📄 Gerar Relatório para WhatsApp</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
    <script>
        function gerarRelatorio() {
            const cep = document.getElementById('cep').value || "Não informado";
            alert("Gerando PDF do Relatório Territorial para o CEP " + cep + "...\nPronto para compartilhar com a Associação de Bairro.");
        }
    </script>
</body>
</html>
